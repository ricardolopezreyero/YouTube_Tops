name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JS syntax
        run: node --check public/app.js && echo "✓ app.js OK"

      - name: Deploy to Cloudflare Pages
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ℹ️  CLOUDFLARE_API_TOKEN no configurado."
            echo "    Para activar deploy automático agrega el secret en:"
            echo "    github.com/ricardolopezreyero/YouTube_Tops/settings/secrets/actions"
            echo "✓  Build validado correctamente — deploy manual con: npm run deploy"
            exit 0
          fi
          npm install -g wrangler
          wrangler pages deploy public --project-name=youtube-tops --branch=main --commit-dirty=true
