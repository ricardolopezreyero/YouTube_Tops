name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Validate JS syntax
        run: node --check public/app.js && echo "✓ Sintaxis app.js OK"

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler pages deploy public --project-name=youtube-tops --branch=main --commit-dirty=true

      - name: Deploy skipped (no token)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "ℹ️ CLOUDFLARE_API_TOKEN no configurado — deploy manual con npm run deploy"
